<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Texture Blend Showcase</title>
  <style>
    :root { --bg:#0f141a; --panel:#18202a; --text:#e6edf4; --muted:#95a2b0; --border:#2b3642; --accent:#a8ddff; --ok:#8de1a8; }
    body { margin:0; color:var(--text); background:radial-gradient(1100px 650px at 15% -20%, #223244, var(--bg)); font:14px/1.35 "Segoe UI", Tahoma, sans-serif; }
    .wrap { max-width:1700px; margin:0 auto; padding:20px; }
    h1 { margin:0 0 8px 0; font-size:28px; }
    h2 { margin:26px 0 12px; border-bottom:1px solid var(--border); padding-bottom:6px; }
    h3 { margin:0 0 8px; color:var(--accent); font-size:16px; }
    .lead { margin:0 0 12px; color:var(--muted); }
    .controls { border:1px solid var(--border); border-radius:10px; background:linear-gradient(180deg,#1d2732,var(--panel)); padding:12px; margin-bottom:14px; }
    .controls-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
    button { border:1px solid #40607a; background:#1f3344; color:#dbf2ff; border-radius:7px; padding:6px 10px; cursor:pointer; font-weight:600; }
    button:hover { background:#29445a; }
    .stats { color:var(--muted); font-size:13px; }
    textarea { width:100%; min-height:210px; border:1px solid var(--border); border-radius:8px; background:#0f151c; color:#dce9f7; padding:10px; font:12px/1.35 Consolas, Menlo, monospace; box-sizing:border-box; }
    .base-block { border:1px solid var(--border); border-radius:10px; background:linear-gradient(180deg,#1c2530,var(--panel)); padding:12px; margin:0 0 14px; }
    .base-head { display:flex; align-items:center; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
    .pill { display:inline-block; border:1px solid #345168; background:#13212d; color:#b5dfff; border-radius:999px; padding:2px 9px; font-size:12px; }
    .blend-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(420px,1fr)); gap:10px; }
    .blend-card { border:1px solid var(--border); border-radius:8px; padding:8px; background:#121922; }
    .blend-label { font-weight:600; margin:0 0 6px; word-break:break-word; }
    .keep-row { display:flex; align-items:center; justify-content:space-between; gap:8px; margin:0 0 6px; }
    .keep-chip { font-size:12px; color:var(--ok); }
    .blend-strip-wrap { border:1px solid #334355; border-radius:4px; background:#0d1117; overflow:hidden; }
    .blend-strip { display:flex; gap:0; align-items:stretch; }
    .blend-strip img, .blend-strip .missing { height:96px; min-width:96px; display:block; image-rendering:pixelated; }
    .missing { display:flex; align-items:center; justify-content:center; padding:0 12px; color:#ffb7b7; background:#2c1515; border-left:1px solid #4f2c2c; white-space:nowrap; }
    .meta { margin-top:6px; color:var(--muted); font-size:12px; }
    code { color:#d4ecff; }
    @media (max-width: 900px) { .blend-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Wall/Insert Blend Showcase</h1>
  <p class="lead">Each preview is shown as <code>&lt;base&gt;&lt;insert&gt;&lt;base&gt;</code> with no spacing so you can judge blending. Uncheck pairings to remove.</p>
  <div class="controls">
    <div class="controls-row">
      <button type="button" onclick="setAll(true)">Check All (Keep)</button>

      <button type="button" onclick="generateFeedback()">Generate Feedback</button>
      <button type="button" onclick="copyFeedback()">Copy Feedback</button>

    <textarea id="feedback" spellcheck="false"></textarea>

function texInfo(name) {
  return TEX_META[name] || {src:`textures_png/${name}.png`, w:0, h:0, exists:false};
}

function imgEl(name) {
  const meta = texInfo(name);
  if (meta.exists) return `<img loading="lazy" src="${meta.src}" alt="${name}" />`;
  return `<div class="missing">${name}</div>`;
}

function render() {
  const root = document.getElementById('content');
  let pairId = 0;
  const themes = ['techbase','urban','hellish'];
  root.innerHTML = themes
    .filter((t) => PAIR_DATA[t])
    .map((theme) => {
      const themeTitle = theme.charAt(0).toUpperCase() + theme.slice(1);
      const blocks = PAIR_DATA[theme].map((g) => {
        const baseMeta = texInfo(g.base);
        const baseInfo = (baseMeta.w && baseMeta.h) ? `${baseMeta.w}x${baseMeta.h}` : '?x?';
        const cards = g.decors.map((decor) => {
          pairId += 1;
          const dMeta = texInfo(decor);
          const dInfo = (dMeta.w && dMeta.h) ? `${dMeta.w}x${dMeta.h}` : '?x?';
          const label = `${g.base} + ${decor} + ${g.base}`;
          return `
            <div class="blend-card">
              <div class="keep-row">
                <label for="pair_${pairId}" class="blend-label" style="margin:0;">${label}</label>
                <label class="keep-chip"><input class="pair-check" id="pair_${pairId}" type="checkbox" checked data-theme="${theme}" data-base="${g.base}" data-decor="${decor}" onchange="updateStats()" /> keep</label>
              </div>
              <div class="blend-strip-wrap"><div class="blend-strip">${imgEl(g.base)}${imgEl(decor)}${imgEl(g.base)}</div></div>
              <div class="meta">Insert: ${decor} (${dInfo})</div>
            </div>`;
        }).join('');
        return `
          <div class="base-block">
            <div class="base-head"><h3 style="margin:0;">Base: ${g.base}</h3><span class="pill">${baseInfo}</span></div>
            <div class="blend-grid">${cards}</div>
          </div>`;
      }).join('');
      return `<h2>${themeTitle}</h2>${blocks}`;
    }).join('');
}

function pairPayloadFromChecks() {
  const checks = Array.from(document.querySelectorAll('.pair-check'));
  const keep = [];
  const remove = [];
  for (const cb of checks) {
    const item = {
      theme: cb.getAttribute('data-theme') || '',
      base: cb.getAttribute('data-base') || '',
      decor: cb.getAttribute('data-decor') || '',
    };
    if (cb.checked) keep.push(item); else remove.push(item);
  }
  return { keep, remove, total: checks.length };
}

function updateStats() {
  const data = pairPayloadFromChecks();
  const stats = document.getElementById('stats');
  if (stats) stats.textContent = `${data.keep.length} kept / ${data.remove.length} removed / ${data.total} total`;
}

function setAll(state) {
  const checks = document.querySelectorAll('.pair-check');
  checks.forEach((cb) => { cb.checked = !!state; });
  updateStats();
  generateFeedback();
}

function generateFeedback() {
  const data = pairPayloadFromChecks();
  const payload = {
    version: 1,
    intent: 'column_pair_feedback',
    generated_at: new Date().toISOString(),
    keep: data.keep,
    remove: data.remove,
  };
  const ta = document.getElementById('feedback');
  if (ta) ta.value = JSON.stringify(payload, null, 2);
}

async function copyFeedback() {
  const ta = document.getElementById('feedback');
  if (!ta) return;
  if (!ta.value.trim()) generateFeedback();
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(ta.value);
      return;
    }
  } catch (_err) {}
  ta.focus();
  ta.select();
  document.execCommand('copy');
}

render();
updateStats();
generateFeedback();
</script>
</body>
</html>
