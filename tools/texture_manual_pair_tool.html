<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manual Texture Pair Tool</title>
  <style>
    :root { --bg:#0f141a; --panel:#18202a; --panel2:#121922; --text:#e6edf4; --muted:#95a2b0; --border:#2b3642; --accent:#a8ddff; --ok:#8de1a8; }
    body { margin:0; color:var(--text); background:radial-gradient(1100px 650px at 15% -20%, #223244, var(--bg)); font:14px/1.35 "Segoe UI", Tahoma, sans-serif; }
    .wrap { max-width: 1800px; margin: 0 auto; padding: 18px; }
    h1 { margin:0 0 8px; font-size:28px; }
    .lead { color:var(--muted); margin:0 0 12px; }
    .panel { border:1px solid var(--border); border-radius:10px; background:linear-gradient(180deg,#1c2530,var(--panel)); padding:12px; margin-bottom:12px; }
    .top-controls { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
    button { border:1px solid #40607a; background:#1f3344; color:#dbf2ff; border-radius:7px; padding:6px 10px; cursor:pointer; font-weight:600; }
    button:hover { background:#29445a; }
    textarea { width:100%; min-height:180px; border:1px solid var(--border); border-radius:8px; background:#0f151c; color:#dce9f7; padding:10px; font:12px/1.35 Consolas, Menlo, monospace; box-sizing:border-box; }
    .preview-wrap { display:grid; grid-template-columns: 1fr auto; gap:12px; align-items:start; }
    .preview-strip-wrap { border:1px solid #334355; border-radius:4px; background:#0d1117; overflow:hidden; }
    .preview-strip { display:flex; gap:0; align-items:stretch; }
    .preview-strip img { height:280px; width:auto; display:block; image-rendering:pixelated; }
    .preview-meta { margin-top:8px; color:var(--muted); }
    .theme-box { border:1px solid var(--border); border-radius:8px; background:var(--panel2); padding:10px; min-width:240px; }
    .theme-box h3 { margin:0 0 8px; color:var(--accent); font-size:15px; }
    .theme-box label { display:block; margin-bottom:6px; }
    .tool-grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    .col { border:1px solid var(--border); border-radius:10px; background:linear-gradient(180deg,#1b2430,var(--panel)); padding:10px; }
    .col h2 { margin:0 0 8px; font-size:18px; }
    .search { width:100%; box-sizing:border-box; border:1px solid var(--border); border-radius:7px; background:#0f151c; color:var(--text); padding:7px 8px; margin-bottom:8px; }
    .scroll { max-height: 190px; overflow:auto; border:1px solid var(--border); border-radius:8px; background:#0e141b; padding:6px; }
    .tex-item { display:grid; grid-template-columns: auto 66px 1fr; gap:8px; align-items:center; padding:5px; border:1px solid transparent; border-radius:6px; }
    .tex-item:hover { border-color:#355169; background:#15202b; }
    .tex-thumb { width:64px; height:48px; object-fit:contain; background:#0b1016; border:1px solid #2d3a48; border-radius:4px; image-rendering:pixelated; }
    .tex-name { font-weight:600; }
    .tex-meta { color:var(--muted); font-size:12px; }
    .picked { border:1px solid var(--border); border-radius:8px; background:var(--panel2); padding:10px; margin:0 0 8px; }
    .picked h3 { margin:0 0 8px; color:var(--accent); font-size:15px; }
    .picked-row { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px; border:1px solid #344355; border-radius:6px; padding:6px; background:#111922; }
    .small-btn { padding:3px 8px; font-size:12px; }
    .stats { color:var(--muted); font-size:12px; }
    @media (max-width: 980px) {
      .preview-wrap { grid-template-columns: 1fr; }
      .preview-strip img { height:200px; }
      .tool-grid { grid-template-columns: 1fr; }
      .scroll { max-height: 190px; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Manual Wall/Insert Pair Tool</h1>
  <p class="lead">Pick a base texture and an insert texture manually. Preview uses <code>&lt;base&gt;&lt;insert&gt;&lt;base&gt;</code>.</p>

    <div class="top-controls">
      <button type="button" onclick="updateFeedback()">Update</button>
      <button type="button" onclick="copyFeedback()">Copy</button>
      <button type="button" onclick="addCurrentPair()">Add Current Pair</button>
      <button type="button" onclick="clearPairs()">Clear Pairs</button>
      <span id="stats" class="stats"></span>
    </div>
    <textarea id="feedback" spellcheck="false"></textarea>
  </div>
  <div class="panel">
    <div class="picked">
      <h3>Picked Pairs (Keep)</h3>
      <div id="picked_list"></div>
    </div>
    <div class="preview-wrap">
      <div>
        <div class="preview-strip-wrap"><div class="preview-strip">
          <img id="preview_base_left" alt="base" />
          <img id="preview_insert_mid" alt="insert" />
          <img id="preview_base_right" alt="base" />
        </div></div>
        <div class="preview-meta" id="preview_meta"></div>
      </div>
      <div class="theme-box">
        <h3>Theme Suitability</h3>
        <label><input type="radio" name="pair_theme" value="techbase" checked onchange="updateFeedback()" /> techbase</label>
        <label><input type="radio" name="pair_theme" value="urban" onchange="updateFeedback()" /> urban</label>
        <label><input type="radio" name="pair_theme" value="hellish" onchange="updateFeedback()" /> hellish</label>
      </div>
    </div>
  </div>

      const mid = document.getElementById('preview_insert_mid');
      const right = document.getElementById('preview_base_right');
      const meta = document.getElementById('preview_meta');

      if (baseMeta) {
        left.src = `textures_png/${baseMeta.file}`;
        left.alt = base;
        right.src = `textures_png/${baseMeta.file}`;
        right.alt = base;
      }

        mid.alt = ins;

        meta.textContent = 'Select base + insert';
      }
    }

        const p = keptPairs[i];
        const row = document.createElement('div');
        row.className = 'picked-row';
        row.innerHTML = `<span><strong>${p.theme}</strong> | ${p.base} -> ${p.decor}</span>`;
        const btn = document.createElement('button');
        btn.className = 'small-btn';
        btn.type = 'button';
        btn.textContent = 'Remove';
        btn.onclick = () => { keptPairs.splice(i, 1); renderKept(); updateFeedback(); };
        row.appendChild(btn);
        box.appendChild(row);
      }
      updateStats();
    }

    function addCurrentPair() {
      const base = selectedBase();
      const decor = selectedInsert();
      const theme = selectedTheme();
      if (!base || !decor) return;
      const candidate = { theme, base, decor };
      const key = pairKey(candidate);
      const exists = keptPairs.some(p => pairKey(p) === key);
      if (!exists) {
        keptPairs.push(candidate);
        renderKept();
        updateFeedback();
      }
    }

    function clearPairs() {
      keptPairs.length = 0;
      renderKept();
      updateFeedback();
    }

    function updateStats() {
      const stats = document.getElementById('stats');
      if (stats) {
        stats.textContent = `Kept pairs: ${keptPairs.length}`;
      }
    }

    function updateFeedback() {
      const payload = {
        version: 1,
        intent: 'column_pair_feedback_manual_tool',
        generated_at: new Date().toISOString(),
        keep: keptPairs,
        remove: []
      };
      const area = document.getElementById('feedback');
      if (area) area.value = JSON.stringify(payload, null, 2);
      updateStats();
    }

    function copyFeedback() {
      const area = document.getElementById('feedback');
      if (!area) return;
      if (!area.value.trim()) updateFeedback();
      area.select();
      area.setSelectionRange(0, 999999);
      try {
        document.execCommand('copy');
      } catch (_) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(area.value);
        }
      }
    }

    function filterList(kind) {
      const queryEl = document.getElementById(kind + '_search');
      const query = (queryEl ? queryEl.value : '').trim().toUpperCase();
      const list = document.getElementById(kind + '_list');
      const items = list ? Array.from(list.querySelectorAll('.tex-item')) : [];
      for (const item of items) {
        const name = (item.getAttribute('data-name') || '').toUpperCase();
        item.style.display = name.includes(query) ? '' : 'none';
      }
    }

    function onSelectionChanged() {
      updatePreview();
      updateFeedback();
    }

    updatePreview();
    updateFeedback();
  </script>
</div>
</body>
</html>
